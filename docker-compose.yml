services:
    app:
        image: computercompany.webapi
        container_name: computercompany_webapi
        build:
            context: .
            dockerfile: src/ComputerCompany.WebApi/Dockerfile
        ports:
            - "80:8080"
        environment:
            - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=computer-company;Username=root;Password=123456789;
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app_network

    postgres:
        container_name: postgres
        image: postgres:18
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: 123456789
            POSTGRES_DB: computer-company
        ports:
            - "5433:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U root -d 123456789"]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d
        networks:
            - app_network

volumes:
     postgres_data:

networks:
    app_network:
        driver: bridge